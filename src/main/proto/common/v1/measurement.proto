syntax = "proto3";

package com.apptorise.retail.admin.v1;

option java_multiple_files = true;
option java_package = "com.apptorise.retail.admin.protos.v1";

enum UnitDimension {
  UNIT_DIMENSION_UNSPECIFIED = 0;
  UNIT_DIMENSION_MASS = 1;
  UNIT_DIMENSION_VOLUME = 2;
  UNIT_DIMENSION_LENGTH = 3;
  UNIT_DIMENSION_AREA = 4;
  UNIT_DIMENSION_DISCRETE = 5;
  UNIT_DIMENSION_DIGITAL = 6;
  UNIT_DIMENSION_CURRENCY = 7;
  UNIT_DIMENSION_POWER = 8;
  UNIT_DIMENSION_FREQUENCY = 9;
  UNIT_DIMENSION_TIME = 10;
}

message MeasurementUnit {
  string id = 1;
  string label = 2;               // e.g., "Ah"
  string full_name = 3;           // e.g., "Ampere Hours"
  string display_description = 4; // e.g., "Used for battery capacity"
  UnitDimension dimension = 5;    // For grouping in UI
  bool is_decimal_supported = 6;
  double conversion_factor = 7;   // For normalization/reporting
  int32 sort_order = 8;           // For logical ordering (XS before S)
}

message ProductMeasurement {
  double value = 1;
  string unit_id = 2;
}